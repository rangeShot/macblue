name: Auto Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from setup.py
        id: version
        run: |
          VERSION=$(grep -oP 'VERSION\s*=\s*"\K[^"]+' setup.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false' && steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          cat > /tmp/release_notes.md <<EOF
          ## What's new in v${VERSION}

          ${CHANGES}

          ## Install / Update

          \`\`\`bash
          # Fresh install
          git clone https://github.com/${{ github.repository }}.git
          cd macblue && bash install.sh

          # Or update existing
          cd /path/to/macblue && git pull && bash install.sh
          \`\`\`
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/release_notes.md

          gh release create "$TAG" \
            --title "macblue v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --target main
